# Qwen3-Embedding-4B — embedding server for classifier-3090 (RTX 3090, 24 GB)
#
# Standalone stack, separate from the main on-prem-workhorse compose.
# Local only: bound to the LAN (192.168.1.138:8091), no Cloudflare tunnel.
#
# Engine: HuggingFace Text Embeddings Inference (TEI) — high-throughput dynamic
# batching (~7.2k tok/s on this 3090 vs ~2k for the old llama.cpp single-slot 8B).
#
# IMPORTANT pins for this box:
#   * image tag 86-1.8 -> CUDA 12.2. Do NOT use 86-1.9 (CUDA 12.9): driver 570
#     maxes at CUDA 12.8, so 1.9 attempts forward-compat and falls back to CPU
#     on this GeForce 3090.
#   * runtime: nvidia (NOT `--gpus all`, which does not attach the GPU here).
#   * this box has only ~15 GB system RAM — run ONE embedding model at a time;
#     two stacks at once thrash swap and hang the host.
#
# To revert to the old llama.cpp 8B: restore docker-compose.llama-8b.yml.bak.
services:
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:86-1.8
    container_name: embeddings
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./data:/data            # HF model cache (Qwen3-Embedding-4B, ~7.6 GB)
    ports:
      - "8091:80"               # TEI serves on :80 inside; external endpoint unchanged
    command:
      - --model-id
      - Qwen/Qwen3-Embedding-4B
      - --pooling
      - last-token              # Qwen3-Embedding uses last-token pooling
      - --dtype
      - float16
      - --auto-truncate
      - --max-client-batch-size
      - "256"
      - --max-batch-tokens
      - "16384"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

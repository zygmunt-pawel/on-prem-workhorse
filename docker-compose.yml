services:
  scraper:
    build: .
    image: on-prem-workhorse:latest
    container_name: scraper
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_KEY=${SCRAPER_API_KEY}
      - PROXY_URL=${PROXY_URL:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Gemma 4 31B (Unsloth UD-Q6_K_XL) via official llama.cpp
  # Built with CUDA 13.0 + sm_89 PTX fallback (native sm_120 has nvcc O3 bug)
  # ~45 t/s generation, ~80 t/s concurrent (2 slots), 128k total context (64k per slot)
  # NOTE: service name kept as "ik-llama" to match Cloudflare tunnel routing config
  ik-llama:
    build:
      context: ./deploy
      dockerfile: Dockerfile
      args:
        CUDA_ARCH: "89" # Ada PTX — Blackwell JIT compiles at runtime. Native 120 broken (nvcc bug)
    container_name: ik-llama
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_PATH=/models/gemma-4-31B-it-GGUF/gemma-4-31B-it-UD-Q6_K_XL.gguf
      - HF_MODEL_URL=${HF_MODEL_URL}
    volumes:
      - ${MODEL_DIR}:/models
    ports:
      - "8090:8090"
    command:
      - -m
      - /models/gemma-4-31B-it-GGUF/gemma-4-31B-it-UD-Q6_K_XL.gguf
      - -ngl
      - "999"       # all layers on GPU
      - -fa
      - "1"         # flash attention (~2x prompt speed)
      - -c
      - "131072"    # 128k context, single slot
      - -ctk
      - q4_0        # KV cache 4-bit — saves ~3 GB VRAM vs q8_0
      - -ctv
      - q4_0
      - --host
      - "0.0.0.0"
      - --port
      - "8090"
      - -np
      - "1"         # single slot — full 128k context for one request
      - --spec-type
      - ngram-simple # n-gram speculative decoding (free speedup on repetitive text)
      - --draft-max
      - "16"
      - --draft-min
      - "4"
      - --api-key
      - ${API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s # model load + warmup takes a while

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    depends_on:
      ik-llama:
        condition: service_healthy
    command:
      - tunnel
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_URL=http://ik-llama:8090

volumes:
  models_data:

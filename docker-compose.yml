services:
  scraper:
    build: .
    image: on-prem-workhorse:latest
    container_name: scraper
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_KEY=${SCRAPER_API_KEY}
      - PROXY_URL=${PROXY_URL:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ik-llama:
    build:
      context: ./deploy
      dockerfile: Dockerfile
      args:
        CUDA_ARCH: "120"
    container_name: ik-llama
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_PATH=/models/Qwen3.5-27B-IQ4_KS-GGUF/Qwen3.5-27B-IQ4_KS.gguf
      - HF_MODEL_URL=${HF_MODEL_URL}
    volumes:
      - ${MODEL_DIR}:/models
    ports:
      - "8090:8090"
    command:
      - -m
      - /models/Qwen3.5-27B-IQ4_KS-GGUF/Qwen3.5-27B-IQ4_KS.gguf
      - -ngl
      - "999"
      - -fa
      - "1"
      - -c
      - "262144"
      - -ctk
      - q8_0
      - -ctv
      - q8_0
      - --host
      - "0.0.0.0"
      - --port
      - "8090"
      - -sps
      - "0"
      - -np
      - "3"
      - -ub
      - "1024"
      - --ctx-checkpoints-interval
      - "0"
      - --mlock
      - --api-key
      - ${API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  embeddings:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: embeddings
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${MODEL_DIR}:/models:ro
    ports:
      - "8091:8091"
    command:
      - --model
      - /models/gte-Qwen2-7B-instruct-GGUF/gte-Qwen2-7B-instruct-Q5_K_M.gguf
      - --embedding
      - --pooling
      - last
      - -ngl
      - "20"
      - -c
      - "8192"
      - --host
      - "0.0.0.0"
      - --port
      - "8091"
      - -np
      - "4"
      - --api-key
      - ${API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    depends_on:
      ik-llama:
        condition: service_healthy
    command:
      - tunnel
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_URL=http://ik-llama:8090

volumes:
  models_data:

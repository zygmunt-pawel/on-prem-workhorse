services:
  scraper:
    build: .
    image: on-prem-workhorse:latest
    container_name: scraper
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_KEY=${SCRAPER_API_KEY}
      - PROXY_URL=${PROXY_URL:-}
      # libuv default is 4 — too tight for spawning chromium under concurrency.
      # If a launch wedges a pool thread (DNS/fs/pipe setup in playwright-ghost),
      # every subsequent /scrape-site queues forever. Larger pool absorbs hangs.
      - UV_THREADPOOL_SIZE=16
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Gemma 4 31B (Unsloth UD-Q6_K_XL) + MTP speculative decoding via official llama.cpp
  # Built with CUDA 13.0 + sm_89 PTX fallback (native sm_120 has nvcc O3 bug)
  # 64k context, single slot. LAN-only — no tunnel, no public exposure.
  # NOTE: historical service name; runs upstream llama.cpp, not ik_llama.cpp
  ik-llama:
    build:
      context: ./deploy
      dockerfile: Dockerfile
      args:
        CUDA_ARCH: "89" # Ada PTX — Blackwell JIT compiles at runtime. Native 120 broken (nvcc bug)
    container_name: ik-llama
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_PATH=/models/gemma-4-31B-it-GGUF/gemma-4-31B-it-UD-Q6_K_XL.gguf
      - HF_MODEL_URL=${HF_MODEL_URL}
      - DRAFT_PATH=/models/gemma-4-31B-it-GGUF/gemma-4-31B-it-Q8_0-MTP.gguf
      - HF_DRAFT_URL=${HF_DRAFT_URL}
    volumes:
      - ${MODEL_DIR}:/models
    ports:
      - "8090:8090"
    command:
      - -m
      - /models/gemma-4-31B-it-GGUF/gemma-4-31B-it-UD-Q6_K_XL.gguf
      - -ngl
      - "999"       # all layers on GPU
      - -fa
      - "1"         # flash attention (~2x prompt speed)
      - -c
      - "65536"     # 64k context — frees ~2.5GB KV so the MTP draft fits next to Q6
      - -ctk
      - q4_0        # KV cache 4-bit — saves ~3 GB VRAM vs q8_0
      - -ctv
      - q4_0
      - --host
      - "0.0.0.0"
      - --port
      - "8090"
      - -np
      - "1"         # single slot — full 64k context for one request
      - --spec-type
      - draft-mtp   # MTP speculative decoding — dedicated draft head trained with
                    # the model; measured 2-2.3x generation speedup vs ngram-simple,
                    # lossless (main model verifies every draft token).
                    # Requires llama.cpp master >= 2026-06-07 (Gemma4 MTP support).
      - -md
      - /models/gemma-4-31B-it-GGUF/gemma-4-31B-it-Q8_0-MTP.gguf
      - --api-key
      - ${API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s # model load + warmup takes a while

volumes:
  models_data:
